<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>反応速度テスト</title>
    <link rel="stylesheet" href="/tools/eye-react-test/styles.css" />
  </head>
  <body>
    <div id="app">
      <!-- 初期画面 -->
      <div id="start-screen" class="screen active">
        <h1>反応速度テスト</h1>
        <p>
          1回目：赤い四角を目で追って、中心の四角が青くなったタイミングでEnterキーを押してください
        </p>
        <p>
          2回目：中心の四角から目を動かさずに、中心の四角が青くなったタイミングでEnterキーを押してください。できれば赤い四角を周辺視野で認識しながら押してください
        </p>

        <p>50msくらい差が出ると思います</p>

        <p>
          スタートボタンをクリックするか、Enterキーを押してテストを開始してください
        </p>

        <div class="test-options">
          <label class="checkbox-label">
            <input type="checkbox" id="test2-checkbox" checked />
            <span class="checkmark"></span>
            テスト2（固定色）を実施する
          </label>
        </div>

        <button id="start-btn" class="btn">スタート</button>
      </div>

      <!-- 休憩画面 -->
      <div id="break-screen" class="screen">
        <h2>準備時間</h2>
        <div class="countdown">
          テスト開始まで: <span id="break-countdown">5</span>秒
        </div>
      </div>

      <!-- テスト画面2 -->
      <div id="test2-screen" class="screen">
        <div class="test-info">
          <div class="timer">残り時間: <span id="test2-timer">60</span>秒</div>
          <div class="target-info">
            青色が表示されたらEnterキーを押してください
          </div>
        </div>
        <div id="fixed-number" class="fixed-number"></div>
        <div id="moving-red-square" class="moving-red-square"></div>
      </div>

      <!-- 結果画面 -->
      <div id="result-screen" class="screen">
        <h2>テスト結果</h2>
        <div class="results">
          <div class="result-item">
            <h3>テスト結果</h3>
            <p>平均反応時間: <span id="test2-avg">0</span>ms</p>
            <p>試行回数: <span id="test2-count">0</span>回</p>
          </div>
        </div>
        <button id="restart-btn" class="btn">もう一度テスト</button>
      </div>
    </div>

    <script src="/tools/eye-react-test/index.js"></script>
  </body>
</html>
